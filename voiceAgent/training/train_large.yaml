# training/train_large.yaml
#
# Fine-tunes Mistral-7B-Instruct-v0.3 on ai-medical-chatbot (256k dialogues).
# This is the main SLM — the one that generates final emotion-aware medical responses.
#
# Run with:
#   oumi train -c training/train_large.yaml

model:
  model_name: "mistralai/Mistral-7B-Instruct-v0.3"
  torch_dtype_str: "bfloat16"
  attn_implementation: "sdpa"
  model_max_length: 512
 
data:
  train:
    datasets:
      - dataset_name: "json"
        dataset_kwargs:
          data_files: "data/processed/train.jsonl"
        split: "train"
 
  validation:
    datasets:
      - dataset_name: "json"
        dataset_kwargs:
          data_files: "data/processed/test.jsonl"
        split: "train"
 
training:
  trainer_type: TRL_SFT
  use_peft: true
  output_dir: "./models/main-slm"
  max_steps: 50
  num_train_epochs: 3
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 8
  enable_gradient_checkpointing: true
  learning_rate: 3.0e-4
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.05
  logging_steps: 25
  save_steps: 200
  eval_strategy: "steps"
  eval_steps: 200
  seed: 42
 
peft:
  lora_r: 8
  lora_alpha: 16
  lora_dropout: 0.05
  lora_target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"
  lora_bias: "none"
  lora_task_type: "CAUSAL_LM"
  q_lora: true
  q_lora_bits: 4
  bnb_4bit_quant_type: "nf4"
  use_bnb_nested_quant: true