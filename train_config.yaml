model:
  model_name: "Qwen/Qwen2.5-1.5B-Instruct"

data:
  train:
    datasets:
      - dataset_name: "bitext/Bitext-customer-support-llm-chatbot-training-dataset"
        split: "train"

training:
  trainer_type: SFT
  max_steps: 500
  per_device_train_batch_size: 4
  learning_rate: 2e-4
  output_dir: "./output/customer-support-model"
  save_steps: 100
  logging_steps: 50

peft:
  peft_method: lora
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05